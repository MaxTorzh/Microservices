version: "3.8"

services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - HTTP_PORT=8080
      - LOG_LEVEL=debug
    volumes:
      - ./:/app
    networks:
      - user-network
    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  user-network:
    driver: bridge
    name: user-network
